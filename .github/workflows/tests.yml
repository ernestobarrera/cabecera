# CI mínima (decisión 2026-07-10): cada push ejecuta la suite completa.
# Solo valida — no despliega nada; GitHub Pages sigue sirviendo main directamente.
name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node tests/test.js
